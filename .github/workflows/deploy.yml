name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]             # auto-deploys on pushes to main
  workflow_dispatch:                # also allow manual runs

permissions:
  contents: write                   # required to push to gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          CI: true
        run: npm run build

      - name: SPA fallback (copy index -> 404)
        run: cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: smartcare.africa     # writes CNAME in the published branch
